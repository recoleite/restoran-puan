<!DOCTYPE html>
<html lang="tr" data-theme="rose">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Restoranlarımız</title>
    <meta name="description" content="Birlikte keşfettiğimiz lezzetler — restoran günlüğümüz">
    <meta name="theme-color" content="#faf7f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Restoranlarımız">
    <link rel="manifest" href="/manifest.webmanifest?v=1.4.2">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=1.4.2">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=1.4.2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="styles.css?v=1.9.0" />
</head>
<body class="auth-pending">
    <div id="app">
        <header class="app-header">
            <div class="header-inner">
                <div class="header-top">
                    <div class="brand">
                        <h1 id="app-title" class="font-display app-title">Bizim Restoranlarımız</h1>
                        <p id="app-subtitle" class="font-script app-subtitle">Birlikte keşfettiğimiz lezzetler</p>
                    </div>
                    <div class="header-actions">
                        <button type="button" onclick="openShareCardModal()" class="header-link">Paylaş</button>
                        <button type="button" onclick="openRouletteModal()" class="header-link">Seç</button>
                        <button type="button" onclick="openSettingsModal()" class="header-link">Ayarlar</button>
                        <button type="button" onclick="logout()" class="header-link header-link-muted">Çıkış</button>
                    </div>
                </div>
                <nav class="nav-tabs" aria-label="Görünüm">
                    <button type="button" id="view-list" onclick="setView('list')" class="nav-tab active">Liste</button>
                    <button type="button" id="view-map" onclick="setView('map')" class="nav-tab">Harita</button>
                    <button type="button" id="view-timeline" onclick="setView('timeline')" class="nav-tab">Anılar</button>
                    <button type="button" id="view-wishlist" onclick="setView('wishlist')" class="nav-tab">İstek</button>
                    <button type="button" id="view-chat" onclick="setView('chat')" class="nav-tab">Sohbet</button>
                </nav>
            </div>
        </header>

        <main class="app-main">
            <section id="dashboard" class="dashboard-section"></section>

            <div id="map-container" class="map-panel hidden"></div>

            <section id="add-section" class="add-panel">
                <button type="button" onclick="toggleAddForm()" class="add-panel-toggle">
                    <span class="add-panel-title">Yeni restoran ekle</span>
                    <span id="add-form-toggle" class="add-panel-chevron" aria-hidden="true">+</span>
                </button>
                <form id="add-form" class="add-form hidden">
                    <div class="form-span">
                        <label class="label" for="add-name">Restoran adı</label>
                        <div class="input-group">
                            <div class="input-wrap">
                                <input type="text" id="add-name" required autocomplete="off" class="input" placeholder="İstediğiniz adı yazın">
                                <div id="add-name-suggest" class="suggest-dropdown hidden"></div>
                            </div>
                            <button type="button" onclick="openNamePicker('add')" class="btn-secondary">Listeden seç</button>
                        </div>
                    </div>
                    <div class="form-span">
                        <label class="label" for="add-location">Konum</label>
                        <div class="input-group">
                            <input type="text" id="add-location" class="input" placeholder="Google Maps linki veya adres">
                            <button type="button" onclick="geocodeLocation('add')" class="btn-secondary">Bul</button>
                        </div>
                        <p id="add-location-status" class="field-hint hidden"></p>
                    </div>
                    <div class="form-grid">
                        <div>
                            <label class="label" id="add-my-rating-label" for="add-my-rating">Puanın</label>
                            <div id="add-my-rating" class="stars"></div>
                            <input type="hidden" id="add-my-rating-val" value="3">
                        </div>
                        <div>
                            <label class="label" id="add-partner-rating-label" for="add-partner-rating">Partner</label>
                            <div id="add-partner-rating" class="stars"></div>
                            <input type="hidden" id="add-partner-rating-val" value="3">
                        </div>
                    </div>
                    <div>
                        <label class="label" for="add-last-visited">Ziyaret tarihi</label>
                        <input type="date" id="add-last-visited" class="input">
                    </div>
                    <div class="form-span">
                        <label class="label">Yemekler</label>
                        <div id="add-dishes" class="dish-list"></div>
                        <button type="button" onclick="addDishRow('add')" class="text-link">+ Yemek ekle</button>
                    </div>
                    <div class="form-span">
                        <label class="label">Etiketler</label>
                        <div id="add-tags" class="tag-row"></div>
                    </div>
                    <div class="form-span">
                        <label class="label" for="add-notes">Not</label>
                        <textarea id="add-notes" rows="3" class="input textarea" placeholder="Neler beğendiniz?"></textarea>
                    </div>
                    <div class="form-span">
                        <label class="label" for="add-photos">Fotoğraflar</label>
                        <input type="file" id="add-photos" accept="image/*" multiple class="file-input">
                        <div id="add-photo-preview" class="photo-preview"></div>
                    </div>
                    <label class="checkbox-row">
                        <input type="checkbox" id="add-favorite">
                        <span>Favorilere ekle</span>
                    </label>
                    <button type="submit" class="btn-primary">Kaydet</button>
                </form>
            </section>

            <section id="list-section">
                <div class="section-head">
                    <h2 class="section-title font-display">Restoranlar</h2>
                </div>
                <div id="restaurant-list" class="restaurant-grid">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>

            <section id="timeline-section" class="hidden">
                <div class="section-head">
                    <h2 class="section-title font-display">Anılar</h2>
                </div>
                <div id="timeline-list" class="timeline-list"></div>
            </section>

            <section id="wishlist-section" class="hidden">
                <div class="section-head section-head-row">
                    <h2 class="section-title font-display">İstek listesi</h2>
                    <button type="button" onclick="openWishlistAddModal()" class="btn-secondary btn-sm">Ekle</button>
                </div>
                <div id="wishlist-list" class="wishlist-list"></div>
            </section>

            <section id="chat-section" class="hidden">
                <div class="section-head section-head-row">
                    <h2 class="section-title font-display">Sohbet</h2>
                    <div id="chat-author-toggle" class="chat-author-toggle"></div>
                </div>
                <div id="chat-link-banner" class="chat-link-banner hidden"></div>
                <div id="chat-messages" class="chat-messages" aria-live="polite"></div>
                <form id="chat-form" class="chat-form">
                    <input type="text" id="chat-input" class="input chat-input" placeholder="Mesaj yaz..." maxlength="2000" autocomplete="off">
                    <button type="submit" class="btn-primary chat-send">Gönder</button>
                </form>
            </section>
        </main>

        <button type="button" id="fab" onclick="openFabMenu()" class="fab" title="Hızlı ekle">+</button>
        <div id="fab-menu" class="fab-menu hidden">
            <button type="button" onclick="fabAddRestaurant()" class="fab-menu-item">Restoran ekle</button>
            <button type="button" onclick="openWishlistAddModal()" class="fab-menu-item">İstek listesine ekle</button>
            <button type="button" onclick="openRouletteModal()" class="fab-menu-item">Rastgele seç</button>
        </div>
    </div>

    <div id="name-picker-modal" class="modal hidden"></div>
    <div id="edit-modal" class="modal hidden"></div>
    <div id="visit-modal" class="modal hidden"></div>
    <div id="history-modal" class="modal hidden"></div>
    <div id="detail-modal" class="modal modal-sheet hidden"></div>
    <div id="settings-modal" class="modal hidden"></div>
    <div id="share-card-modal" class="modal hidden"></div>
    <input type="file" id="backup-file-input" accept=".json,application/json" class="hidden" onchange="importBackup(event)">
    <div id="roulette-modal" class="modal hidden"></div>
    <div id="wishlist-modal" class="modal hidden"></div>
    <div id="photo-lightbox" class="lightbox hidden" onclick="closeLightbox(event)">
        <button type="button" class="lightbox-close" onclick="closeLightbox(event)">×</button>
        <button type="button" id="lightbox-prev" class="lightbox-nav lightbox-prev hidden" onclick="lightboxNav(-1, event)">‹</button>
        <img id="lightbox-img" src="" class="lightbox-img" onclick="event.stopPropagation()" alt="">
        <button type="button" id="lightbox-next" class="lightbox-nav lightbox-next hidden" onclick="lightboxNav(1, event)">›</button>
        <div id="lightbox-counter" class="lightbox-counter"></div>
    </div>
    <div id="toast" class="toast"><span id="toast-msg"></span></div>
    <div id="confetti-root" aria-hidden="true"></div>

    <div id="mascot" class="mascot" data-mood="neutral" data-character="bear" role="img" aria-label="Lezzet arkadaşı" title="Sürükleyebilirsin">
        <div id="mascot-bubble" class="mascot-bubble hidden" aria-live="polite"></div>
        <div class="mascot-art" id="mascot-art"></div>
    </div>

    <script src="mascots.js?v=1.9.0"></script>
    <script src="app.js?v=1.9.0"></script>
</body>
</html>
